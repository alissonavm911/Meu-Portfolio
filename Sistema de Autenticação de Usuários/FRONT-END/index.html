<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivo HTML</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>Sistema de Usuários</h1>
    <nav>
      <a href="index.html" class="signIn">Login</a>
      <a href="signUp.html" class="signUp1">Cadastro</a>
    </nav>
  </header>

  <main class="container">
    <section class="container_2">
      <header>
        <h2>Conecte-se a sua conta!</h2>
      </header>
      <form>
        Email:
        <input type="email" name="email" autocomplete="email"  class="email" placeholder="name@example.com">
        <br>
        Senha:
        <input type="password" autocomplete="new-password" name="password" class="password" placeholder="senha">
        <br>
        <button class="button2" type="button">Entrar</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <h3 class="finalText">
      Desenvolvido por Alisson A. V. Moreira &trade;
    </h3>
  </footer>
  <script src="script.js"></script>
</body>
</html>
