<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arquivo HTML</title>
    <link rel="stylesheet" href="style.css" />
    <!-- 1. SCRIPT CORRETO DO GOOGLE (OBRIGATÓRIO) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <header class="header">
      <h1>Sistema de Usuários</h1>
      <nav>
        <a href="index.html" class="signIn">Login</a>
        <a href="signUp.html" class="signUp1">Cadastro</a>
      </nav>
    </header>

    <main class="container">
      <section class="container_2">
        <header>
          <h2>Conecte-se a sua conta!</h2>
        </header>
        <form>
          Email:
          <input
            type="email"
            name="email"
            class="email"
            autocomplete="email"
            placeholder="name@example.com"
          />
          <br />
          Senha:
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            class="password"
            placeholder="senha"
          />
          <br />
          <button class="button2" type="button">Entrar</button>

          <!-- 2. CONFIGURAÇÃO COM SEU ID -->
          <div
            id="g_id_onload"
            data-client_id="93964721445-u2s1htqo5rfdhojv2792ptpuqscl1bga.apps.googleusercontent.com"
            data-context="signin"
            data-ux_mode="popup"
            data-callback="handleCredentialResponse"
            data-auto_prompt="false"
          ></div>

          <!-- 3. O BOTÃO DO GOOGLE -->
          <div
            class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="outline"
            data-text="signin_with"
            data-shape="rectangular"
            data-logo_alignment="left"
            onclick=""
          ></div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <h3 class="finalText">Desenvolvido por Alisson A. V. Moreira &trade;</h3>
    </footer>

    <script src="script.js"></script>
    <script>
      function handleCredentialResponse(response) {
        // Decodifica o token para pegar os dados
        const data = JSON.parse(atob(response.credential.split(".")[1]));

        console.log("Usuário logado:", data);

        const mensagem = document.getElementById("mensagem");
        mensagem.innerHTML = `
          <h3>Bem-vindo, ${data.name}!</h3>
          <img src="${data.picture}" alt="Foto" style="border-radius: 50%; width: 50px;">
        `;
      }
    </script>
  </body>
</html>
