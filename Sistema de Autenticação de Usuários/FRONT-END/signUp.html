<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivo HTML</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>Sistema de Usuários</h1>
    <nav>
      <a href="index.html" class="signIn1">Login</a>
      <a href="signUp.html" class="signUp">Cadastro</a>
    </nav>
  </header>

  <main class="container">
    <section class="container_1">
      <header>
        <h2>Cadastro</h2>
      </header>
      <form>
        Nome:
        <input type="text" name="name" id="name" autocomplete="name" placeholder="Nome">
        <br>
        Email:
        <input type="email" name="email" id="email" autocomplete="email" placeholder="name@example.com">
        <br>
        Senha:
        <input type="password" name="password" autocomplete="current-password" id="password" placeholder="senha">
        <br>
        <button class="button1" type="button">Cadastrar</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <h3 class="finalText">
      Desenvolvido por Alisson A. V. Moreira &trade;
    </h3>
  </footer>
  <script src="script.js"></script>
</body>
</html>
